services:
  mcp-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-gateway
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8010"
    networks:
      - mcp_internal
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  mcp_internal:
    driver: bridge
  proxy:
    external: true
    name: proxy
