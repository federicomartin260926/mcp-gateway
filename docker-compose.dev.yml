services:
  mcp-gateway:
    ports:
      - "8010:8010"
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: mcp-gateway-ngrok
    restart: unless-stopped
    command:
      - http
      - mcp-gateway:8010
      - --domain=${NGROK_DOMAIN}
      - --host-header=localhost:8010
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - mcp-gateway
    networks:
      - mcp_internal
    profiles:
      - tunnel
