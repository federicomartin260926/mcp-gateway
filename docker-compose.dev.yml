services:
  mcp-gateway:
    ports:
      - "8010:8010"
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dev-router:
    image: nginx:alpine
    container_name: mcp-dev-router
    restart: unless-stopped
    volumes:
      - ./docker/dev-router/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mcp-gateway
    networks:
      - mcp_internal
    profiles:
      - tunnel

  ngrok:
    image: ngrok/ngrok:latest
    container_name: mcp-gateway-ngrok
    restart: unless-stopped
    command:
      - http
      - dev-router:8088
      - --domain=${NGROK_DOMAIN}
      - --host-header=lavish-supply-custodian.ngrok-free.dev
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - dev-router
    networks:
      - mcp_internal
    profiles:
      - tunnel
