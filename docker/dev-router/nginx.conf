events {}

http {
    server {
        listen 8088;

        client_max_body_size 50m;

        location /mcp {
            proxy_pass http://mcp-gateway:8010/mcp;
            proxy_http_version 1.1;

            proxy_set_header Host localhost:8010;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        location /health {
            proxy_pass http://mcp-gateway:8010/health;
            proxy_set_header Host localhost:8010;
        }

        location /info {
            proxy_pass http://mcp-gateway:8010/info;
            proxy_set_header Host localhost:8010;
        }

        location /webhooks/whatsapp {
            proxy_pass http://host.docker.internal:8001/webhooks/whatsapp;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /internal/media/whatsapp/ {
            proxy_pass http://host.docker.internal:8001/internal/media/whatsapp/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}